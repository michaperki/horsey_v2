<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Horsey — Wireframe Exploration</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4ede0;
    --paper-2:#ede3d2;
    --paper-3:#e3d6bd;
    --ink:#1b1815;
    --ink-2:#3a342c;
    --pencil:#6b6356;
    --pencil-2:#9b9384;
    --felt:#1d5a3c;
    --felt-deep:#0e3a26;
    --gold:#c89738;
    --gold-2:#e3b557;
    --hot:#c1392b;
    --cool:#2c5d8a;
    --rule: rgba(27,24,21,.32);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif}
  body{
    background-image:
      radial-gradient(circle at 20% 30%, rgba(27,24,21,.045), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(27,24,21,.04), transparent 35%),
      repeating-linear-gradient(0deg, transparent 0 28px, rgba(27,24,21,.04) 28px 29px);
    min-height:100vh;
  }
  .hand{font-family:"Caveat",cursive;font-weight:600;letter-spacing:.005em}
  .hand-2{font-family:"Patrick Hand",cursive}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace}
  .ink{color:var(--ink)}
  .pencil{color:var(--pencil)}

  /* page chrome */
  .doc{max-width:1480px;margin:0 auto;padding:32px 28px 120px}
  .masthead{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:8px}
  .masthead .title{font-family:"Caveat";font-weight:700;font-size:52px;line-height:.95;margin:0}
  .masthead .sub{font-family:"Patrick Hand";font-size:18px;color:var(--ink-2);margin-top:2px}
  .meta{display:flex;gap:16px;align-items:center;color:var(--pencil);font-size:12px;text-transform:uppercase;letter-spacing:.16em}
  .meta .dot{width:8px;height:8px;border-radius:99px;background:var(--hot);box-shadow:0 0 0 4px rgba(193,57,43,.18)}

  /* tab nav */
  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin:18px 0 22px;border-bottom:1px dashed var(--rule);padding-bottom:14px}
  .tab{font-family:"Patrick Hand";font-size:18px;padding:8px 14px 6px;border:1.5px solid var(--ink);background:var(--paper-2);border-radius:9px 9px 4px 9px;cursor:pointer;color:var(--ink);box-shadow:2px 2px 0 var(--ink);transition:transform .08s ease}
  .tab:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink)}
  .tab.on{background:var(--ink);color:var(--paper);box-shadow:2px 2px 0 var(--gold)}
  .tab .num{font-family:"JetBrains Mono";font-size:11px;opacity:.6;margin-right:6px}

  /* section header */
  .sec-hd{display:flex;align-items:baseline;justify-content:space-between;gap:24px;margin:24px 0 8px}
  .sec-hd h2{font-family:"Caveat";font-weight:700;font-size:34px;margin:0;line-height:1}
  .sec-hd .note{font-family:"Patrick Hand";font-size:15px;color:var(--ink-2);max-width:620px}

  /* variant rail */
  .rail{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:22px;align-items:start}
  .rail.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
  .rail.cols-1{grid-template-columns:1fr}
  @media (max-width:900px){.rail{grid-template-columns:1fr}}

  /* artboard */
  .art{position:relative;background:var(--paper);border:1.75px solid var(--ink);border-radius:10px;box-shadow:5px 5px 0 var(--ink);overflow:hidden}
  .art .stamp{position:absolute;top:-12px;left:14px;background:var(--ink);color:var(--paper);font-family:"JetBrains Mono";font-size:10px;letter-spacing:.18em;padding:3px 8px;border-radius:4px;text-transform:uppercase}
  .art .stamp .v{color:var(--gold-2)}
  .art .strap{display:flex;align-items:center;justify-content:space-between;padding:18px 14px 8px;border-bottom:1px dashed var(--rule)}
  .art .strap .nm{font-family:"Caveat";font-weight:700;font-size:24px;line-height:1}
  .art .strap .nm small{display:block;font-family:"Patrick Hand";font-size:12px;color:var(--pencil);letter-spacing:.04em}
  .art .strap .tag{font-family:"JetBrains Mono";font-size:10px;letter-spacing:.14em;color:var(--pencil);text-transform:uppercase}
  .art .canvas{padding:14px;background:
    repeating-linear-gradient(0deg, transparent 0 22px, rgba(27,24,21,.045) 22px 23px);
  }
  .art .canvas.flat{background:none}

  /* desktop frame */
  .frame-desk{position:relative;border:1.5px solid var(--ink);border-radius:8px;background:var(--paper-2);padding:8px;box-shadow:inset 0 0 0 1px rgba(27,24,21,.08)}
  .frame-desk::before{content:"";position:absolute;top:8px;left:8px;right:8px;height:18px;background:repeating-linear-gradient(90deg, transparent 0 4px, rgba(27,24,21,.18) 4px 5px);border-bottom:1px dashed var(--rule)}
  .frame-desk > .vp{margin-top:18px;border:1.25px solid var(--ink);background:var(--paper);min-height:480px}

  /* phone frame */
  .frame-phone{position:relative;width:300px;margin:0 auto;border:1.75px solid var(--ink);border-radius:32px;background:var(--ink);padding:10px 8px 14px;box-shadow:5px 5px 0 var(--ink)}
  .frame-phone .notch{height:18px;display:flex;align-items:center;justify-content:center;color:var(--paper);font-family:"JetBrains Mono";font-size:9px;letter-spacing:.2em;opacity:.6}
  .frame-phone .vp{border-radius:22px;overflow:hidden;background:var(--paper);min-height:580px;border:1px solid var(--paper-3)}
  .frame-phone::after{content:"";position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:90px;height:4px;background:var(--paper-3);border-radius:99px}

  /* sketchy primitives */
  .sk{border:1.5px solid var(--ink);background:var(--paper);border-radius:6px}
  .sk.shadow{box-shadow:2.5px 2.5px 0 var(--ink)}
  .sk.dash{border-style:dashed}
  .sk.felt{background:var(--felt);color:var(--paper);border-color:var(--felt-deep);box-shadow:2.5px 2.5px 0 var(--felt-deep)}
  .sk.gold{background:var(--gold);border-color:#7a5a1f;color:var(--ink);box-shadow:2.5px 2.5px 0 #7a5a1f}
  .sk.ink-blk{background:var(--ink);color:var(--paper);box-shadow:2.5px 2.5px 0 var(--gold)}
  .sk.hot{background:#fff1ee;border-color:var(--hot);color:var(--hot)}
  .sk.muted{background:var(--paper-2)}
  .row{display:flex;gap:8px}
  .col{display:flex;flex-direction:column;gap:8px}
  .grow{flex:1}
  .center{display:flex;align-items:center;justify-content:center}
  .between{display:flex;align-items:center;justify-content:space-between;gap:8px}

  /* chip */
  .chip{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:99px;background:repeating-conic-gradient(var(--gold) 0 15deg, var(--paper) 15deg 30deg);border:2px solid var(--ink);font-family:"JetBrains Mono";font-weight:700;font-size:11px;color:var(--ink);box-shadow:2px 2px 0 var(--ink)}
  .chip.sm{width:28px;height:28px;font-size:9px;box-shadow:1.5px 1.5px 0 var(--ink)}
  .chip.lg{width:56px;height:56px;font-size:13px}
  .chip.green{background:repeating-conic-gradient(var(--felt) 0 15deg, var(--paper) 15deg 30deg);color:var(--ink)}
  .chip.red{background:repeating-conic-gradient(var(--hot) 0 15deg, var(--paper) 15deg 30deg)}
  .chip.black{background:repeating-conic-gradient(var(--ink) 0 15deg, #444 15deg 30deg);color:var(--paper)}

  /* avatar */
  .av{width:36px;height:36px;border-radius:99px;background:var(--paper-2);border:1.5px solid var(--ink);display:inline-flex;align-items:center;justify-content:center;font-family:"Caveat";font-weight:700;font-size:18px;flex-shrink:0;position:relative}
  .av.sm{width:24px;height:24px;font-size:13px;border-width:1px}
  .av.lg{width:54px;height:54px;font-size:24px}
  .av .stat{position:absolute;bottom:-2px;right:-2px;width:11px;height:11px;border-radius:99px;background:#42b36a;border:1.5px solid var(--paper)}
  .av .stat.idle{background:var(--gold)}
  .av .stat.ingame{background:var(--hot)}

  /* annotations */
  .anno{position:relative;font-family:"Caveat";font-weight:600;color:var(--hot);font-size:18px;line-height:1.05}
  .anno.pencil{color:var(--ink-2)}
  .anno svg{display:block}
  .anno-row{display:flex;align-items:flex-start;gap:8px}
  .anno-arrow{flex-shrink:0;color:var(--hot);transform:translateY(2px)}

  /* mini board */
  .board{display:grid;grid-template-columns:repeat(8,1fr);width:100%;aspect-ratio:1/1;border:1.5px solid var(--ink);background:var(--paper-2);overflow:hidden}
  .board.sm{max-width:140px}
  .board.md{max-width:240px}
  .board.lg{max-width:100%}
  .board > div{background:var(--paper)}
  .board > div.d{background:var(--paper-3)}

  /* sparkline */
  .spark{height:28px;width:100%;display:block}
  .spark path{fill:none;stroke:var(--ink);stroke-width:1.5}
  .spark.up path{stroke:#2b8a4f}
  .spark.dn path{stroke:var(--hot)}

  /* generic micro */
  .pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:99px;border:1px solid var(--ink);background:var(--paper);font-family:"JetBrains Mono";font-size:9px;letter-spacing:.06em;text-transform:uppercase}
  .pill.hot{background:#fff1ee;border-color:var(--hot);color:var(--hot)}
  .pill.live{background:var(--hot);border-color:var(--hot);color:#fff}
  .pill.gold{background:var(--gold);border-color:#7a5a1f}
  .pill.green{background:#dff0e4;border-color:#2b6f47;color:#1f5635}
  .pill.dark{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .heart{display:inline-block;width:7px;height:7px;border-radius:99px;background:var(--hot);box-shadow:0 0 0 3px rgba(193,57,43,.2);margin-right:5px;animation:pulse 1.4s ease infinite}
  @keyframes pulse{50%{box-shadow:0 0 0 6px rgba(193,57,43,0)}}

  /* "image" placeholders */
  .ph{position:relative;background:repeating-linear-gradient(45deg,var(--paper-2),var(--paper-2) 6px,var(--paper-3) 6px,var(--paper-3) 12px);border:1.25px dashed var(--ink);display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono";font-size:10px;color:var(--ink-2);text-align:center;padding:6px}

  /* connector */
  .leg{display:flex;align-items:center;gap:4px;font-family:"Patrick Hand";font-size:12px;color:var(--pencil)}
  .leg .sw{width:14px;height:10px;border-radius:2px}

  /* utility */
  .gap-4{gap:4px}.gap-6{gap:6px}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}.gap-20{gap:20px}
  .p-8{padding:8px}.p-12{padding:12px}.p-16{padding:16px}
  .mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}
  .tac{text-align:center}.tar{text-align:right}
  .w-full{width:100%}.h-full{height:100%}
  .nowrap{white-space:nowrap}
  .uc{text-transform:uppercase;letter-spacing:.14em}
  .small{font-size:11px}.tiny{font-size:9px}
  .h2{font-family:"Caveat";font-weight:700;font-size:22px;line-height:1}
  .h3{font-family:"Patrick Hand";font-size:16px}
  .num{font-family:"JetBrains Mono";font-weight:600}

  /* density */
  body.dense .art .canvas{padding:10px}
  body.dense .frame-desk > .vp{min-height:420px}
  body.dense .frame-phone{transform:scale(.92);transform-origin:top}
  body.roomy .art .canvas{padding:22px}
  body.roomy .frame-desk > .vp{min-height:560px}

  /* annotations toggle */
  body.no-anno .anno-row{display:none}
  body.no-anno .anno{display:none}

  /* mobile-only / desktop-only view */
  body.only-mobile .desk-only{display:none}
  body.only-desk .mob-only{display:none}

  /* legend strip */
  .legend{display:flex;flex-wrap:wrap;gap:18px;padding:14px 16px;border:1.5px dashed var(--rule);border-radius:8px;background:var(--paper-2);margin-bottom:18px}
  .legend .h{font-family:"Caveat";font-weight:700;font-size:20px;margin-right:8px}
  .legend .item{display:flex;align-items:center;gap:8px;font-family:"Patrick Hand";font-size:13px;color:var(--ink-2)}
  .legend .sw{width:22px;height:14px;border:1.25px solid var(--ink);border-radius:3px}
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="lobby.jsx"></script>
  <script type="text/babel" src="wager.jsx"></script>
  <script type="text/babel" src="ingame.jsx"></script>
  <script type="text/babel" src="postgame.jsx"></script>
  <script type="text/babel" src="profile.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>

# fly.toml app configuration file generated for horsey on 2026-05-26T19:02:35+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'horsey'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  HORSEY_DB_PATH = '/data/horsey.db'
  HORSEY_TRUST_PROXY = '1'
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '8787'

[[mounts]]
  source = 'horsey_data'
  destination = '/data'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/api/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
